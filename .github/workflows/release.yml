# Release: build server binaries and VS Code extension, create GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Leave empty to use the tag that triggered the workflow."
        required: false

permissions:
  contents: read

env:
  BINARY_NAME: spec42
  MCP_BINARY_NAME: spec42-mcp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    name: Release preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Standard library config is current
        run: node scripts/sync-standard-library-config.mjs --check

      - name: Domain libraries config is current
        run: node scripts/sync-domain-libraries-config.mjs --check

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_KPAR_DIR=${{ github.workspace }}/.cache/sysml-stdlib-kpar-${VERSION}" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Prepare domain libraries bundle
        run: |
          VERSION=$(node -p "require('./config/domain-libraries.json').version")
          echo "SPEC42_DOMAIN_LIBRARIES_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_DOMAIN_LIBRARIES_BUNDLE_ZIP=${{ github.workspace }}/.cache/elan8-domain-libraries-${VERSION}.kpar" >> $GITHUB_ENV

      - name: Restore domain libraries bundle cache
        uses: actions/cache/restore@v4
        id: domain-libraries-cache
        with:
          path: .cache/elan8-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}.kpar
          key: sysml-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}

      - name: Fetch domain libraries bundle
        if: steps.domain-libraries-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-domain-libraries-bundle.sh

      - name: Save domain libraries bundle cache
        if: steps.domain-libraries-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/elan8-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}.kpar
          key: sysml-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}

      - name: Rust tests
        run: |
          cargo test --workspace --exclude server --exclude lsp_server
          cargo test -p server --lib
          cargo test -p server --test multi_file_check
          cargo test -p lsp_server --lib --test debt_guardrails --test parse_validation
          # Each integration test starts a server and awaits asynchronous indexing.
          # Run this suite serially so CPU contention cannot exhaust its retry budget.
          cargo test -p lsp_server --test lsp_integration -- --test-threads=1
          cargo test -p server \
            --test api_http \
            --test mcp_tools \
            --test cli_ai_tools \
            --test mcp_protocol \
            --test mcp_binary \
            --test kitchen_timer_check \
            -- --include-ignored

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

  build-server:
    name: Build server (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            target: x86_64-unknown-linux-gnu
            package_dir: linux-x64
            archive_ext: tar.gz
            binary_ext: ""
          - runner: macos-latest
            os_name: darwin
            target: x86_64-apple-darwin
            package_dir: darwin-x64
            archive_ext: tar.gz
            binary_ext: ""
          - runner: macos-latest
            os_name: darwin
            target: aarch64-apple-darwin
            package_dir: darwin-arm64
            archive_ext: tar.gz
            binary_ext: ""
          - runner: windows-latest
            os_name: win32
            target: x86_64-pc-windows-msvc
            package_dir: win32-x64
            archive_ext: zip
            binary_ext: ".exe"

    steps:
      - name: Resolve tag and version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare SysML stdlib bundle
        shell: bash
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_KPAR_DIR=${{ github.workspace }}/.cache/sysml-stdlib-kpar-${VERSION}" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Prepare domain libraries bundle
        shell: bash
        run: |
          VERSION=$(node -p "require('./config/domain-libraries.json').version")
          echo "SPEC42_DOMAIN_LIBRARIES_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_DOMAIN_LIBRARIES_BUNDLE_ZIP=${{ github.workspace }}/.cache/elan8-domain-libraries-${VERSION}.kpar" >> $GITHUB_ENV

      - name: Restore domain libraries bundle cache
        uses: actions/cache/restore@v4
        id: domain-libraries-cache
        with:
          path: .cache/elan8-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}.kpar
          key: sysml-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}

      - name: Fetch domain libraries bundle
        if: steps.domain-libraries-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/fetch-domain-libraries-bundle.sh

      - name: Save domain libraries bundle cache
        if: steps.domain-libraries-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/elan8-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}.kpar
          key: sysml-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}

      - name: Build release binary
        run: cargo build --release -p server --target ${{ matrix.target }}

      - name: Prepare archive (Unix)
        if: matrix.binary_ext == ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BIN="${{ env.BINARY_NAME }}${{ matrix.binary_ext }}"
          MCP_BIN="${{ env.MCP_BINARY_NAME }}${{ matrix.binary_ext }}"
          ARCHIVE="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.package_dir }}.${{ matrix.archive_ext }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "staging/$BIN"
          cp "target/${{ matrix.target }}/release/${{ env.MCP_BINARY_NAME }}" "staging/$MCP_BIN"
          tar czf "$ARCHIVE" -C staging "$BIN" "$MCP_BIN"
          echo "ARCHIVE_NAME=$ARCHIVE" >> $GITHUB_ENV

      - name: Prepare archive (Windows)
        if: matrix.binary_ext == '.exe'
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $archive = "${{ env.BINARY_NAME }}-$version-${{ matrix.package_dir }}.zip"
          $releaseDir = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$releaseDir/${{ env.BINARY_NAME }}.exe", "$releaseDir/${{ env.MCP_BINARY_NAME }}.exe" -DestinationPath $archive
          echo "ARCHIVE_NAME=$archive" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload server artifact
        uses: actions/upload-artifact@v6
        with:
          name: server-${{ matrix.package_dir }}
          path: ${{ env.BINARY_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.package_dir }}.${{ matrix.archive_ext }}

  package-extension-with-server:
    name: Package extension with server (all platforms)
    runs-on: ubuntu-latest
    needs: [preflight, build-server]
    steps:
      - name: Resolve tag and version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}
          submodules: recursive

      - name: Download server artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: server-*
          path: artifacts/server
          merge-multiple: false

      - name: Unpack server binaries into vscode/server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BIN="${{ env.BINARY_NAME }}"
          mkdir -p vscode/server/linux-x64 vscode/server/darwin-x64 vscode/server/darwin-arm64 vscode/server/win32-x64
          tar -xzf "artifacts/server/server-linux-x64/${BIN}-${VERSION}-linux-x64.tar.gz" -C vscode/server/linux-x64
          tar -xzf "artifacts/server/server-darwin-x64/${BIN}-${VERSION}-darwin-x64.tar.gz" -C vscode/server/darwin-x64
          tar -xzf "artifacts/server/server-darwin-arm64/${BIN}-${VERSION}-darwin-arm64.tar.gz" -C vscode/server/darwin-arm64
          unzip -o -j "artifacts/server/server-win32-x64/${BIN}-${VERSION}-win32-x64.zip" -d vscode/server/win32-x64

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install vscode deps and package
        run: |
          cd vscode && npm ci && npm run build:webview-assets && npm run build:webview && npm run compile && npm run verify:package-layout && npm run package

      - name: Verify packaged VSIX layout
        run: |
          cd vscode
          VSIX_FILE="$(find . -maxdepth 1 -name '*.vsix' | head -n 1)"
          test -n "$VSIX_FILE"
          node scripts/verify-package-layout.js --vsix "$VSIX_FILE"

      - name: Smoke test packaged VSIX activation
        run: |
          cd vscode
          VSIX_FILE="$(find . -maxdepth 1 -name '*.vsix' | head -n 1)"
          test -n "$VSIX_FILE"
          xvfb-run -a node scripts/smoke-vsix-activation.js \
            --vsix "$VSIX_FILE" \
            --workspace "testFixture/workspaces/single-file" \
            --doc "testFixture/workspaces/single-file/SurveillanceDrone.sysml"

      - name: Upload extension artifact (bundled)
        uses: actions/upload-artifact@v6
        with:
          name: extension
          path: vscode/*.vsix

  build-zed-extension:
    name: Build Zed extension
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - name: Resolve tag and version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check (zed extension)
        run: cargo check --manifest-path zed/Cargo.toml --target wasm32-wasip2 --release

      - name: Archive Zed extension sources
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="spec42-zed-${VERSION}.tar.gz"
          tar czf "$ARCHIVE" \
            zed/Cargo.toml \
            zed/Cargo.lock \
            zed/README.md \
            zed/extension.toml \
            zed/src \
            zed/languages
          echo "ARCHIVE_NAME=$ARCHIVE" >> $GITHUB_ENV

      - name: Verify Zed extension bundle layout
        run: |
          tar -tzf "${{ env.ARCHIVE_NAME }}" > zed-bundle-contents.txt
          grep -Fx "zed/extension.toml" zed-bundle-contents.txt
          grep -Fx "zed/Cargo.toml" zed-bundle-contents.txt
          grep -Fx "zed/src/lib.rs" zed-bundle-contents.txt
          grep -Fx "zed/languages/sysml/config.toml" zed-bundle-contents.txt
          grep -Fx "zed/languages/sysml/highlights.scm" zed-bundle-contents.txt

      - name: Upload Zed extension artifact
        uses: actions/upload-artifact@v6
        with:
          name: zed-extension
          path: ${{ env.ARCHIVE_NAME }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, build-server, package-extension-with-server, build-zed-extension]
    permissions:
      contents: write
    steps:
      - name: Resolve tag and version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Checkout (for tag ref on manual run)
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}

      - name: Download server artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: server-*
          path: artifacts/server
          merge-multiple: false

      - name: Download extension artifact
        uses: actions/download-artifact@v7
        with:
          name: extension
          path: artifacts/extension

      - name: Download Zed extension artifact
        uses: actions/download-artifact@v7
        with:
          name: zed-extension
          path: artifacts/zed-extension

      - name: List release assets
        run: |
          echo "Server binaries:"
          find artifacts/server -type f
          echo "Extension:"
          find artifacts/extension -type f
          echo "Zed extension:"
          find artifacts/zed-extension -type f

      - name: Generate SHA256 checksums
        run: |
          find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > CHANGELOG_RELEASE_SECTION.md

          {
            echo "## Spec42 ${TAG}"
            echo
            if [ -s CHANGELOG_RELEASE_SECTION.md ]; then
              cat CHANGELOG_RELEASE_SECTION.md
            else
              echo "Release notes for ${TAG}. See CHANGELOG.md for project history."
            fi
            cat <<EOF

          ## Installation

          - VS Code: install the attached .vsix, or install **SysML v2 Editor** from the Visual Studio Marketplace.
          - CLI: download the platform archive for your OS and put \`spec42\` on your PATH.
          - GitHub Action: use \`elan8/spec42@${TAG}\` in workflows to install this release and run \`spec42 check\`.
          - Zed: download and extract the attached spec42-zed bundle, then use **Install Dev Extension** and select the extracted \`zed\` directory.

          ## Included Artifacts

          - Platform archives include \`spec42\` and \`spec42-mcp\`.
          - \`spec42-mcp\` is a stdio MCP server exposing validation and model-inspection tools for assistant workflows.
          - The VS Code .vsix includes the matching language server binary.
          - The Zed extension can download the matching server binary automatically when no configured or PATH-installed \`spec42\` binary is found.
          - \`SHA256SUMS.txt\` contains checksums for all attached artifacts.

          ## Documentation

          - GitHub Action usage: docs/user/GITHUB-ACTION.md
          - Assistant and MCP setup: docs/user/AI-ASSISTANTS.md
          - Troubleshooting: docs/user/TROUBLESHOOTING.md
          EOF
          } > RELEASE_NOTES.txt

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file RELEASE_NOTES.txt \
            artifacts/server/*/* \
            artifacts/extension/*.vsix \
            artifacts/zed-extension/* \
            SHA256SUMS.txt
