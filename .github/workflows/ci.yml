# CI: build, test, and (optional) run SysML v2 validation suite
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  SPEC42_STDLIB_BUNDLE_ZIP: ${{ github.workspace }}/.cache/sysml-v2-release-2026-03.zip
  SPEC42_STDLIB_BUNDLE_URL: https://github.com/Systems-Modeling/SysML-v2-Release/archive/refs/tags/2026-03.zip

jobs:
  rust-fast:
    name: Rust fast checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Fetch SysML stdlib bundle
        run: |
          mkdir -p "$(dirname "$SPEC42_STDLIB_BUNDLE_ZIP")"
          curl --fail --location --retry 3 --output "$SPEC42_STDLIB_BUNDLE_ZIP" "$SPEC42_STDLIB_BUNDLE_URL"

      - name: Conformance matrix is current
        run: node scripts/generate-conformance-matrix.mjs --check

      - name: cargo test (core workspace, fast path)
        run: |
          cargo test --workspace --exclude spec42
          cargo test -p spec42 --lib
          cargo test -p spec42 --test multi_file_check

      - name: requirements slice integration checks
        run: |
          cargo test -p kernel --test lsp_integration integration::model::lsp_sysml_model_graph_resolves_requirement_usage_typing_same_file
          cargo test -p kernel --test lsp_integration integration::model::lsp_sysml_model_graph_resolves_requirement_usage_typing_cross_file
          cargo test -p kernel --test lsp_integration integration::diagnostics::unresolved_satisfy_reference_emits_semantic_diagnostic

      - name: Large workspace performance report (non-blocking)
        continue-on-error: true
        run: |
          set +e
          cargo test -p kernel --test lsp_integration integration::workspace::lsp_large_workspace_performance_report -- --ignored --nocapture 2>&1 | tee large-workspace-perf.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## Large workspace performance report"
            echo
            grep "SPEC42_PERF_REPORT" large-workspace-perf.txt || echo "No SPEC42_PERF_REPORT line emitted."
            echo
            if [ "$status" -ne 0 ]; then
              echo "Perf report command exited with status $status (non-blocking)."
              echo
            fi
            echo "Budgets are report-only until baselines are accepted."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: cargo clippy (required fast path)
        run: cargo clippy --workspace --all-targets -- -W clippy::all

  rust-agent-surfaces:
    name: Rust agent/API surfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Fetch SysML stdlib bundle
        run: |
          mkdir -p "$(dirname "$SPEC42_STDLIB_BUNDLE_ZIP")"
          curl --fail --location --retry 3 --output "$SPEC42_STDLIB_BUNDLE_ZIP" "$SPEC42_STDLIB_BUNDLE_URL"

      - name: Agent/API surface integration tests
        run: |
          cargo test -p spec42 \
            --test api_http \
            --test mcp_tools \
            --test cli_ai_tools \
            --test mcp_protocol \
            --test mcp_binary \
            --test kitchen_timer_check

      - name: Build spec42-mcp binary
        run: cargo build -p spec42 --bin spec42-mcp

  extension-tests:
    name: VS Code extension tests
    runs-on: ubuntu-latest
    env:
      VSCODE_TEST_VERSION: "1.99.0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch SysML stdlib bundle
        run: |
          mkdir -p "$(dirname "$SPEC42_STDLIB_BUNDLE_ZIP")"
          curl --fail --location --retry 3 --output "$SPEC42_STDLIB_BUNDLE_ZIP" "$SPEC42_STDLIB_BUNDLE_URL"

      - name: Build server (debug for extension test host)
        run: cargo build -p spec42

      - name: Build server (release for packaging parity)
        run: cargo build --release -p spec42

      - name: Add server to PATH
        run: |
          echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH
          echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH
          # Ensure VS Code extension tests use the in-repo server binary (avoid PATH/order flakiness).
          # Prefer debug (built for the test host), fallback to release.
          if [ -x "${{ github.workspace }}/target/debug/spec42" ]; then
            chmod +x "${{ github.workspace }}/target/debug/spec42" || true
            echo "SPEC42_SERVER_PATH=${{ github.workspace }}/target/debug/spec42" >> $GITHUB_ENV
            echo "SPEC42_SERVER_PATH set to debug binary"
          elif [ -x "${{ github.workspace }}/target/release/spec42" ]; then
            chmod +x "${{ github.workspace }}/target/release/spec42" || true
            echo "SPEC42_SERVER_PATH=${{ github.workspace }}/target/release/spec42" >> $GITHUB_ENV
            echo "SPEC42_SERVER_PATH set to release binary"
          else
            echo "WARNING: spec42 binary not found in target/{debug,release}"
            ls -la "${{ github.workspace }}/target" || true
            ls -la "${{ github.workspace }}/target/debug" || true
            ls -la "${{ github.workspace }}/target/release" || true
          fi

      - name: Diagnose server binary (CI)
        run: |
          echo "SPEC42_SERVER_PATH=${SPEC42_SERVER_PATH:-"(unset)"}"
          if [ -n "${SPEC42_SERVER_PATH:-}" ]; then
            ls -la "${SPEC42_SERVER_PATH}" || true
            file "${SPEC42_SERVER_PATH}" || true
            ldd "${SPEC42_SERVER_PATH}" || true
            "${SPEC42_SERVER_PATH}" --version || true
            "${SPEC42_SERVER_PATH}" --help || true
          fi

      - name: Diagnose fixture serverPath settings (CI)
        run: |
          echo "single-file settings.json:"
          cat "${{ github.workspace }}/vscode/testFixture/workspaces/single-file/.vscode/settings.json" || true
          echo "large-workspace settings.json:"
          cat "${{ github.workspace }}/vscode/testFixture/workspaces/large-workspace/.vscode/settings.json" || true

      - name: npm ci (vscode)
        run: cd vscode && npm ci

      - name: Build extension and webview
        run: cd vscode && npm run build:webview-assets && npm run build:webview && npm run compile

      - name: LM CLI argv unit tests
        run: cd vscode && npm run test:lm-cli-unit

      - name: Package VSIX
        run: cd vscode && npm run package

      - name: Smoke test packaged VSIX activation
        run: |
          cd vscode
          xvfb-run -a node scripts/smoke-vsix-activation.js \
            --vsix "spec42-*.vsix" \
            --workspace "testFixture/workspaces/single-file" \
            --doc "testFixture/workspaces/single-file/SurveillanceDrone.sysml" \
            --server-path "${SPEC42_SERVER_PATH}"

      - name: npm test (extension tests)
        run: cd vscode && xvfb-run -a npm test

      - name: npm test (multi-file)
        run: cd vscode && xvfb-run -a npm run test:multi-file

      - name: npm test (workspace smoke)
        run: cd vscode && xvfb-run -a npm run test:workspace-smoke

      - name: npm test (interconnection)
        run: cd vscode && xvfb-run -a npm run test:interconnection

  zed-extension:
    name: Zed extension build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check (zed extension)
        run: cargo check --manifest-path zed/Cargo.toml --target wasm32-wasip2 --release
