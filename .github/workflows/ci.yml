# CI: required fast checks plus targeted integration smoke tests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  VSCODE_TEST_VERSION: "1.99.0"

jobs:
  rust-core:
    name: Rust core checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Standard library config is current
        run: node scripts/sync-standard-library-config.mjs --check

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_BUNDLE_ZIP=${{ github.workspace }}/.cache/sysml-v2-release-${VERSION}.zip" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Conformance matrix is current
        run: node scripts/generate-conformance-matrix.mjs --check

      - name: Requirements slice integration checks
        run: |
          cargo test -p kernel --test lsp_integration integration::model::lsp_sysml_model_graph_resolves_requirement_usage_typing_same_file
          cargo test -p kernel --test lsp_integration integration::model::lsp_sysml_model_graph_resolves_requirement_usage_typing_cross_file
          cargo test -p kernel --test lsp_integration integration::diagnostics::unresolved_satisfy_reference_emits_semantic_diagnostic

      - name: cargo test (core workspace)
        run: |
          cargo test --workspace --exclude spec42
          cargo test -p spec42 --lib

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

  rust-surfaces:
    name: Rust agent/API surfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_BUNDLE_ZIP=${{ github.workspace }}/.cache/sysml-v2-release-${VERSION}.zip" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Agent/API surface integration tests
        run: |
          cargo test -p spec42 \
            --test api_http \
            --test mcp_tools \
            --test cli_ai_tools \
            --test mcp_protocol \
            --test mcp_binary \
            --test kitchen_timer_check \
            --test multi_file_check

      - name: Build spec42-mcp binary
        run: cargo build -p spec42 --bin spec42-mcp

  frontend-unit:
    name: Frontend unit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            shared/diagram-renderer/package-lock.json
            vscode/package-lock.json

      - name: npm ci (diagram renderer)
        run: cd shared/diagram-renderer && npm ci

      - name: npm typecheck (diagram renderer)
        run: cd shared/diagram-renderer && npm run typecheck

      - name: npm test (diagram renderer)
        run: cd shared/diagram-renderer && npm test

      - name: npm test:coverage (diagram renderer)
        run: cd shared/diagram-renderer && npm run test:coverage

      - name: npm ci (vscode)
        run: cd vscode && npm ci

      - name: Typecheck extension
        run: cd vscode && npm run typecheck

      - name: LM CLI argv unit tests
        run: cd vscode && npm run test:lm-cli-unit

      - name: Library view model unit tests
        run: cd vscode && npm run test:library-unit

      - name: UX unit tests
        run: cd vscode && xvfb-run -a npm run test:ux-unit

      - name: Upload frontend failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-artifacts
          if-no-files-found: ignore
          path: |
            vscode/.vscode-test/**
            vscode/test-output/**
            /tmp/spec42-vscode-test-exports/**

  vscode-smoke:
    name: VS Code smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_BUNDLE_ZIP=${{ github.workspace }}/.cache/sysml-v2-release-${VERSION}.zip" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Build server (debug for extension test host)
        run: cargo build -p spec42

      - name: Configure server path
        run: |
          echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH
          if [ -x "${{ github.workspace }}/target/debug/spec42" ]; then
            chmod +x "${{ github.workspace }}/target/debug/spec42" || true
            echo "SPEC42_SERVER_PATH=${{ github.workspace }}/target/debug/spec42" >> $GITHUB_ENV
            echo "SPEC42_SERVER_PATH set to debug binary"
          else
            echo "spec42 debug binary not found"
            ls -la "${{ github.workspace }}/target/debug" || true
            exit 1
          fi

      - name: Diagnose server binary
        run: |
          echo "SPEC42_SERVER_PATH=${SPEC42_SERVER_PATH:-"(unset)"}"
          ls -la "${SPEC42_SERVER_PATH}"
          file "${SPEC42_SERVER_PATH}" || true
          ldd "${SPEC42_SERVER_PATH}" || true
          "${SPEC42_SERVER_PATH}" --version || true

      - name: npm ci (vscode)
        run: cd vscode && npm ci

      - name: Build extension and webview
        run: cd vscode && npm run build:webview-assets && npm run build:webview && npm run compile

      - name: npm test (extension smoke)
        run: cd vscode && xvfb-run -a npm test

      - name: npm test (multi-file smoke)
        run: cd vscode && xvfb-run -a npm run test:multi-file

      - name: npm test (workspace smoke)
        run: cd vscode && xvfb-run -a npm run test:workspace-smoke

      - name: npm test (state view integration)
        run: cd vscode && xvfb-run -a npm run test:state-view

      - name: npm test (interconnection integration)
        run: cd vscode && xvfb-run -a npm run test:interconnection

      - name: npm test (server restart smoke)
        run: cd vscode && xvfb-run -a npm run test:server-restart

      - name: Upload VS Code smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-smoke-artifacts
          if-no-files-found: ignore
          path: |
            vscode/.vscode-test/**
            vscode/test-output/**
            /tmp/spec42-vscode-test-exports/**

  package-smoke:
    name: VSIX package smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_BUNDLE_ZIP=${{ github.workspace }}/.cache/sysml-v2-release-${VERSION}.zip" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-v2-release-${{ env.SPEC42_STDLIB_VERSION }}.zip
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Build server (release for packaging)
        run: cargo build --release -p spec42

      - name: Configure packaged server path
        run: |
          echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH
          if [ -x "${{ github.workspace }}/target/release/spec42" ]; then
            chmod +x "${{ github.workspace }}/target/release/spec42" || true
            echo "SPEC42_SERVER_PATH=${{ github.workspace }}/target/release/spec42" >> $GITHUB_ENV
            echo "SPEC42_SERVER_PATH set to release binary"
          else
            echo "spec42 release binary not found"
            ls -la "${{ github.workspace }}/target/release" || true
            exit 1
          fi

      - name: npm ci (vscode)
        run: cd vscode && npm ci

      - name: Build extension and webview
        run: cd vscode && npm run build:webview-assets && npm run build:webview && npm run compile

      - name: Verify package layout
        run: cd vscode && npm run verify:package-layout

      - name: Package VSIX
        run: cd vscode && npm run package

      - name: Smoke test packaged VSIX activation
        run: |
          cd vscode
          xvfb-run -a node scripts/smoke-vsix-activation.js \
            --vsix "spec42-*.vsix" \
            --workspace "testFixture/workspaces/single-file" \
            --doc "testFixture/workspaces/single-file/SurveillanceDrone.sysml" \
            --server-path "${SPEC42_SERVER_PATH}"

      - name: Upload package smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-smoke-artifacts
          if-no-files-found: ignore
          path: |
            vscode/*.vsix
            vscode/.vscode-test/**
            vscode/test-output/**
            /tmp/spec42-vscode-test-exports/**

  zed-extension:
    name: Zed extension build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check (zed extension)
        run: cargo check --manifest-path zed/Cargo.toml --target wasm32-wasip2 --release
