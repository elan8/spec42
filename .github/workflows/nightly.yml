name: Nightly

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sysml-release-validation:
    name: SysML release validation (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_KPAR_DIR=${{ github.workspace }}/.cache/sysml-stdlib-kpar-${VERSION}" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Clone SysML-v2-Release
        run: git clone --depth 1 https://github.com/Systems-Modeling/SysML-v2-Release.git sysml-v2-release

      - name: Run workspace scan test with SysML release
        env:
          SYSML_V2_RELEASE_DIR: ${{ github.workspace }}/sysml-v2-release
        run: cargo test -p lsp_server lsp_workspace_scan_sysml_release -- --nocapture

      - name: Engineering unit catalog regression
        env:
          SYSML_V2_RELEASE_DIR: ${{ github.workspace }}/sysml-v2-release
        run: cargo test -p sysml_model engineering_prefixed_units mismatched_unit_dimension_emits -- --nocapture

      - name: OMG 14c metadata diagnostic ratchet
        env:
          SYSML_V2_RELEASE_DIR: ${{ github.workspace }}/sysml-v2-release
        run: bash scripts/check-omg-14c-metadata-ratchet.sh

  vscode-visualization-deep:
    name: VS Code visualization deep tests (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      VSCODE_TEST_VERSION: "1.99.0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_KPAR_DIR=${{ github.workspace }}/.cache/sysml-stdlib-kpar-${VERSION}" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Prepare domain libraries bundle
        run: |
          VERSION=$(node -p "require('./config/domain-libraries.json').version")
          echo "SPEC42_DOMAIN_LIBRARIES_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_DOMAIN_LIBRARIES_BUNDLE_ZIP=${{ github.workspace }}/.cache/elan8-domain-libraries-${VERSION}.kpar" >> $GITHUB_ENV

      - name: Restore domain libraries bundle cache
        uses: actions/cache/restore@v4
        id: domain-libraries-cache
        with:
          path: .cache/elan8-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}.kpar
          key: sysml-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}

      - name: Fetch domain libraries bundle
        if: steps.domain-libraries-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-domain-libraries-bundle.sh

      - name: Save domain libraries bundle cache
        if: steps.domain-libraries-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/elan8-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}.kpar
          key: sysml-domain-libraries-${{ env.SPEC42_DOMAIN_LIBRARIES_VERSION }}

      - name: Build server (debug for visualization test host)
        run: cargo build -p server

      - name: Configure server path
        run: |
          echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH
          chmod +x "${{ github.workspace }}/target/debug/spec42" || true
          echo "SPEC42_SERVER_PATH=${{ github.workspace }}/target/debug/spec42" >> $GITHUB_ENV

      - name: npm ci (vscode)
        run: cd vscode && npm ci

      - name: Build extension and webview
        run: cd vscode && npm run build:webview-assets && npm run build:webview && npm run compile

      - name: npm test (interconnection)
        run: cd vscode && xvfb-run -a npm run test:interconnection

      - name: npm test (state view)
        run: cd vscode && xvfb-run -a npm run test:state-view

      - name: Upload visualization failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-visualization-deep-artifacts
          if-no-files-found: ignore
          path: |
            vscode/.vscode-test/**
            vscode/test-output/**
            vscode/tests/output/**
            /tmp/spec42-vscode-test-exports/**

  performance:
    name: Performance regression guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare SysML stdlib bundle
        run: |
          VERSION=$(node -p "require('./config/standard-library.json').version")
          echo "SPEC42_STDLIB_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SPEC42_STDLIB_KPAR_DIR=${{ github.workspace }}/.cache/sysml-stdlib-kpar-${VERSION}" >> $GITHUB_ENV

      - name: Restore SysML stdlib bundle cache
        uses: actions/cache/restore@v4
        id: stdlib-cache
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Fetch SysML stdlib bundle
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-stdlib-bundle.sh

      - name: Save SysML stdlib bundle cache
        if: steps.stdlib-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sysml-stdlib-kpar-${{ env.SPEC42_STDLIB_VERSION }}
          key: sysml-stdlib-${{ env.SPEC42_STDLIB_VERSION }}

      - name: Run drone interconnection performance report
        run: cargo test -p lsp_server --test lsp_integration integration::powersystems_performance::drone_interconnection_performance_smoke_report -- --nocapture

      - name: Check drone interconnection performance budgets
        run: node scripts/check-perf-budgets.mjs target/spec42-perf/drone-interconnection-performance.json
