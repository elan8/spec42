version: 2
library: Ros2Overlay
rules:
  - id: ROS201
    severity: error
    category: messaging
    title: Publisher and subscriber types must match topic type
    scope:
      where: RosPublisher, RosSubscriber, RosTopic
    condition:
      kind: topic_message_compatibility
      publisher_field: messageTypeRef
      subscriber_field: messageTypeRef
      topic_field: messageTypeRef
    message: "Type mismatch on {topicRef}: pub={publisherType} sub={subscriberType} topic={topicType}"
    remediation: "Align endpoint types with the RosTopic.messageTypeRef value."
  - id: ROS202
    severity: warning
    category: lifecycle
    title: Lifecycle nodes should have explicit lifecycle state modeling
    scope:
      where: RosLifecycleNode, LifecycleState
    condition:
      kind: lifecycle_node_has_state
      node_field: name
      lifecycle_field: phase
    message: "Lifecycle node {name} has no explicit lifecycle state."
    remediation: "Model at least one LifecycleState for each RosLifecycleNode."
  - id: ROS203
    severity: warning
    category: transforms
    title: Transform frames should model parent relationship
    scope:
      where: RosTransformFrame
    condition:
      kind: frame_has_parent
      frame_field: name
      parent_field: parentFrameRef
    message: "Frame {name} has no parent frame relationship."
    remediation: "Set parentFrameRef unless the frame is the declared transform root."
  - id: ROS204
    severity: error
    category: qos
    title: Publisher and subscriber QoS should be compatible
    scope:
      where: RosPublisher, RosSubscriber, RosQosProfile
    condition:
      kind: qos_compatibility
      publisher_qos_field: qosProfileRef
      subscriber_qos_field: qosProfileRef
    message: "QoS mismatch on {topicRef}: publisher={publisherQos} subscriber={subscriberQos}"
    remediation: "Use compatible reliability, durability, and depth values."
  - id: ROS301
    severity: error
    category: generation
    title: Runtime component should define package and executable mapping
    scope:
      where: RosRuntimeComponent
    condition:
      kind: required_fields_present
      required_fields: packageRef, executableName, launchGroupName
    message: "Runtime component {name} is missing package/executable/launch mapping."
    remediation: "Set packageRef, executableName, and launchGroupName on each RosRuntimeComponent."
  - id: ROS302
    severity: error
    category: generation
    title: Endpoint ports should bind topic and type metadata
    scope:
      where: RosEndpointPort
    condition:
      kind: endpoint_binding_complete
      owner_field: ownerNodeRef
      topic_field: topicRef
      message_field: messageTypeRef
      qos_field: qosProfileRef
    message: "Endpoint port {name} has incomplete binding metadata."
    remediation: "Set ownerNodeRef and endpoint binding fields needed for deterministic generation."
  - id: ROS303
    severity: error
    category: generation
    title: Deployment units should map nodes to package executables
    scope:
      where: RosDeploymentUnit
    condition:
      kind: required_fields_present
      required_fields: packageRef, executableName, nodeRef
    message: "Deployment unit {name} is missing package/executable/node mapping."
    remediation: "Set packageRef, executableName, and nodeRef for each RosDeploymentUnit."
  - id: ROS304
    severity: warning
    category: generation
    title: Parameters should be typed and defaulted
    scope:
      where: RosParameter
    condition:
      kind: parameter_has_type_and_default
      type_field: parameterType
      default_fields: defaultInt, defaultFloat, defaultBool, defaultText
    message: "Parameter {name} has no explicit type or default value."
    remediation: "Set parameterType and one default value field to support config generation."
  - id: ROS305
    severity: warning
    category: traceability
    title: Generated artifacts should have model traceability records
    scope:
      where: RosGenerationArtifact, RosTraceabilityEntry
    condition:
      kind: artifact_traceability_present
      artifact_field: artifactPath
      model_field: modelElementId
    message: "Generated artifact mapping is missing traceability coverage."
    remediation: "Add RosTraceabilityEntry records for each generated artifact path."
  - id: ROS306
    severity: error
    category: generation
    title: Launch descriptions should declare launch mode and package
    scope:
      where: RosLaunchDescription
    condition:
      kind: required_fields_present
      required_fields: launchMode, packageRef, launchGroupName
    message: "Launch description {name} is missing launch mode/group/package mapping."
    remediation: "Set launchMode, launchGroupName, and packageRef on each RosLaunchDescription."
  - id: ROS307
    severity: error
    category: generation
    title: TF producers should define source, target, authority, and owner
    scope:
      where: RosTfProducer
    condition:
      kind: required_fields_present
      required_fields: sourceFrameRef, targetFrameRef, authorityKind, ownerNodeRef
    message: "TF producer {name} is missing frame authority mapping."
    remediation: "Set sourceFrameRef, targetFrameRef, authorityKind, and ownerNodeRef."
  - id: ROS308
    severity: error
    category: generation
    title: Lifecycle manager configuration should declare manager, order, and target state
    scope:
      where: RosLifecycleManagerConfig
    condition:
      kind: required_fields_present
      required_fields: managerNodeRef, managedNodeOrder, targetState
    message: "Lifecycle manager config {name} is missing managed-node sequencing."
    remediation: "Populate managerNodeRef, managedNodeOrder, and targetState."
  - id: ROS309
    severity: warning
    category: generation
    title: Security profiles should map nodes to enclave and policy
    scope:
      where: RosSecurityProfile
    condition:
      kind: required_fields_present
      required_fields: ownerNodeRef, enclaveRef, securityPolicyRef
    message: "Security profile {name} is missing enclave/policy mapping."
    remediation: "Define ownerNodeRef, enclaveRef, and securityPolicyRef for each security profile."
  - id: ROS310
    severity: warning
    category: generation
    title: Manifest dependencies should declare package and dependency kind
    scope:
      where: RosManifestDependency
    condition:
      kind: required_fields_present
      required_fields: ownerPackageRef, dependencyKind, dependencyPackageRef
    message: "Manifest dependency {name} is incomplete."
    remediation: "Set ownerPackageRef, dependencyKind, and dependencyPackageRef."
  - id: ROS311
    severity: warning
    category: generation
    title: Parameter profiles should bind nodes to parameter files
    scope:
      where: RosParameterProfile
    condition:
      kind: required_fields_present
      required_fields: ownerNodeRef, parameterFileRef
    message: "Parameter profile {name} is missing node/file binding."
    remediation: "Set ownerNodeRef and parameterFileRef on each RosParameterProfile."
