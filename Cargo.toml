[workspace]
resolver = "2"
members = [
  "crates/kernel",
  "crates/plugins",
  "crates/server",
]

[workspace.package]
version = "0.21.0"
edition = "2021"
authors = ["Elan8"]
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
petgraph = "0.8"
sysml-v2-parser = { path = "../sysml-v2-parser" }
