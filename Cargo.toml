[workspace]
resolver = "2"
members = [
  "spec42-core",
  "sysml-diagrams",
  "server",
  "elk-rust/crates/elk-core",
  "elk-rust/crates/elk-graph",
  "elk-rust/crates/elk-layered",
  "elk-rust/crates/elk-testkit",
]

[workspace.package]
version = "0.5.0"
edition = "2021"
authors = ["Elan8"]
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
petgraph = "0.8"
elk-core = { path = "elk-rust/crates/elk-core" }
elk-graph = { path = "elk-rust/crates/elk-graph" }
elk-layered = { path = "elk-rust/crates/elk-layered" }
