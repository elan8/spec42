[workspace]
resolver = "2"
members = [
  "spec42-core",
  "server",
]

[workspace.package]
version = "0.6.0"
edition = "2021"
authors = ["Elan8"]
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
petgraph = "0.8"
