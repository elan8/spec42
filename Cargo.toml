[workspace]
resolver = "2"
members = [
  "crates/kernel",
  "crates/software-architecture",
  "crates/server",
  "crates/semantic_core",
]

[workspace.package]
version = "0.23.0"
edition = "2021"
authors = ["Elan8"]
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
rmcp = { version = "0.9", features = ["server"] }
schemars = { version = "1.1", features = ["derive"] }
petgraph = "0.8"
sysml-v2-parser = { git = "https://github.com/elan8/sysml-v2-parser", tag = "v0.9.0" }
