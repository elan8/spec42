<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}' {{CSP_SOURCE}}; img-src {{CSP_SOURCE}} data:; font-src {{CSP_SOURCE}}; worker-src blob: {{CSP_SOURCE}};">
<title>SysML Model Visualizer</title>
<link rel="stylesheet" href="{{CODICONS_CSS_URI}}">
<script nonce="{{NONCE}}" src="{{D3_URI}}"></script>
<script nonce="{{NONCE}}" src="{{ELK_URI}}"></script>
<style nonce="{{NONCE}}">{{STYLES}}</style>
</head>
<body>
<div id="controls">
    <div style="display: flex; align-items: center; gap: 4px 8px; flex-wrap: wrap; padding: 2px 0;">
        <div class="view-dropdown">
            <button id="view-dropdown-btn" class="view-btn" title="Select a defined SysML view">
                <span class="codicon codicon-chevron-down"></span> Select SysML View
            </button>
            <div id="view-dropdown-menu" class="view-dropdown-menu"></div>
        </div>
        <span style="color: var(--vscode-panel-border);">|</span>
        <button id="reset-btn" class="action-btn" title="Home (fit to window)"><span class="codicon codicon-home"></span></button>
        <button id="layout-direction-btn" class="action-btn" title="Toggle layout direction"><span class="codicon codicon-arrow-right"></span> LR</button>
        <button id="legend-btn" class="action-btn" title="Show diagram legend"><span class="codicon codicon-key"></span> Legend</button>
        <span style="color: var(--vscode-panel-border);">|</span>
        <div class="export-dropdown" style="position: relative; display: inline-block;">
            <button id="export-btn" class="action-btn" title="Export diagram"><span class="codicon codicon-desktop-download"></span> Export</button>
            <div id="export-menu" class="export-menu">
                <div class="export-submenu-container">
                    <button class="export-menu-item" data-format="png-parent">PNG</button>
                    <div class="export-submenu">
                        <button class="export-menu-item" data-format="png" data-scale="1">1x - Original</button>
                        <button class="export-menu-item" data-format="png" data-scale="2">2x - Double ✓</button>
                        <button class="export-menu-item" data-format="png" data-scale="3">3x - Triple</button>
                        <button class="export-menu-item" data-format="png" data-scale="4">4x - Quadruple</button>
                    </div>
                </div>
                <button class="export-menu-item" data-format="svg">SVG</button>
                <button class="export-menu-item" data-format="json">JSON</button>
            </div>
        </div>
    </div>
</div>
<div id="view-status-banner"></div>

<div id="visualization-wrapper">
    <div id="visualization"></div>
    <!-- Legend popup overlay -->
    <div id="legend-popup">
        <div id="legend-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--vscode-panel-border); padding-bottom: 8px; cursor: grab; user-select: none;">
            <span style="font-weight: 600; font-size: 13px;">Diagram Legend</span>
            <button id="legend-close-btn" class="codicon codicon-close" style="background: none; border: none; color: var(--vscode-editor-foreground); cursor: pointer; font-size: 16px; padding: 0 2px; opacity: 0.7;" title="Close legend"></button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 7px;">
            <div style="font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-top: 2px;">Controls</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="codicon codicon-home" style="font-size: 13px; opacity: 0.85;"></span>
                <span>Home <span style="font-size: 10px; opacity: 0.7;">(fit to window)</span></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="codicon codicon-symbol-structure" style="font-size: 13px; opacity: 0.85;"></span>
                <span>View selector <span style="font-size: 10px; opacity: 0.7;">(pick a defined SysML view)</span></span>
            </div>
            <div style="font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-top: 2px;">General View</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <svg width="40" height="12"><line x1="0" y1="6" x2="32" y2="6" stroke="var(--vscode-editor-foreground)" stroke-width="2" stroke-dasharray="5,3"/><polyline points="32,2 40,6 32,10" fill="none" stroke="var(--vscode-editor-foreground)" stroke-width="1.5"/></svg>
                <span>Typing <code style="font-size: 10px; opacity: 0.8;">: Type</code></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <svg width="40" height="12"><line x1="0" y1="6" x2="31" y2="6" stroke="var(--vscode-editor-foreground)" stroke-width="2"/><polygon points="32,2 40,6 32,10" fill="var(--vscode-editor-background)" stroke="var(--vscode-editor-foreground)" stroke-width="1.5"/></svg>
                <span>Specialization <code style="font-size: 10px; opacity: 0.8;">:&gt;</code></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <svg width="40" height="14"><polygon points="0,7 5,3 10,7 5,11" fill="var(--vscode-editor-foreground)"/><line x1="10" y1="7" x2="40" y2="7" stroke="var(--vscode-editor-foreground)" stroke-width="2"/></svg>
                <span>Containment <code style="font-size: 10px; opacity: 0.8;">◆</code></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <svg width="40" height="12"><line x1="0" y1="6" x2="40" y2="6" stroke="var(--vscode-editor-foreground)" stroke-width="1.8" stroke-dasharray="2,2"/></svg>
                <span>Binding <code style="font-size: 10px; opacity: 0.8;">=</code></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <svg width="40" height="12"><line x1="0" y1="6" x2="32" y2="6" stroke="var(--vscode-editor-foreground)" stroke-width="2" stroke-dasharray="8,4"/><polygon points="32,2 40,6 32,10" fill="var(--vscode-editor-foreground)"/></svg>
                <span>Allocation</span>
            </div>

        </div>
    </div>
    <!-- Loading overlay (outside visualization to avoid being removed) -->
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading workspace model...</div>
    </div>
</div>

<script nonce="{{NONCE}}">window.__VIZ_INIT={elkWorkerUrl:'{{ELK_WORKER_URI}}',enabledViews:{{ENABLED_VIEW_IDS_JSON}},experimentalViews:{{EXPERIMENTAL_VIEW_IDS_JSON}},verboseLogging:{{VERBOSE_LOGGING_JSON}}};</script>
<script nonce="{{NONCE}}" src="{{VISUALIZER_JS_URI}}"></script>
</body>
</html>
