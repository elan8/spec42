[package]
name = "spec42"
version = "0.9.0"
edition = "2021"
description = "Language server for SysML v2 (LSP over stdio)"

[[bin]]
name = "spec42"
path = "src/main.rs"

[dependencies]
spec42-core = { path = "../spec42-core" }
tokio = { version = "1", features = ["full"] }
serde_json = { workspace = true }

[dev-dependencies]
sysml-parser = { git = "https://github.com/elan8/sysml-parser", rev = "f11faf38cbc75ac57753fa86f57d120a14bb986a" }
serde_json = { workspace = true }
tempfile = "3"
url = "2"
