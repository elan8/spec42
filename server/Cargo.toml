[package]
name = "spec42"
version = "0.14.0"
edition = "2021"
description = "Language server for SysML v2 (LSP over stdio)"

[[bin]]
name = "spec42"
path = "src/main.rs"

[dependencies]
spec42-core = { path = "../spec42-core" }
tokio = { version = "1", features = ["full"] }
serde_json = { workspace = true }

[dev-dependencies]
sysml-parser = { git = "https://github.com/elan8/sysml-parser", rev = "5fed0acc64bc17af9e53dbba116fc9a90910e3dc" }
serde_json = { workspace = true }
tempfile = "3"
url = "2"
